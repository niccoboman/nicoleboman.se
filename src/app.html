<!doctype html>
<html lang="sv">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Nicole Boman — översättare mellan teknik och människa. AI-konsult, föreläsare och utbildare i Sverige." />

		<script>
			(function () {
				try {
					var storedTheme = localStorage.getItem('theme');
					var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var theme = storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : (prefersDark ? 'dark' : 'light');
					document.documentElement.setAttribute('data-theme', theme);
					var storedLang = localStorage.getItem('lang');
					var lang = storedLang === 'en' || storedLang === 'sv' ? storedLang : 'sv';
					document.documentElement.setAttribute('lang', lang);
					document.documentElement.setAttribute('data-lang', lang);
				} catch (e) {}
			})();
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
