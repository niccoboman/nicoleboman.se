<!doctype html>
<html lang="sv">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Nicole Boman — generativ AI på mänskliga villkor. AI-konsult, keynote speaker och utbildare i Stockholm." />

		<script>
			(function () {
				try {
					var storedLang = localStorage.getItem('lang');
					var lang = storedLang === 'en' || storedLang === 'sv' ? storedLang : 'sv';
					document.documentElement.setAttribute('lang', lang);
					document.documentElement.setAttribute('data-lang', lang);
				} catch (e) {}
			})();
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;600&family=Fragment+Mono&family=Instrument+Serif:ital@1&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
